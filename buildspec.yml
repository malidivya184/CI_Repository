version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - echo Installing dependencies...
      - pip install --upgrade pip
      - pip install -r requirements.txt

  pre_build:
    commands:
      - echo Running pre-build checks...

  build:
    commands:
      - echo Build started on `date`
      - python app.py

  post_build:
    commands:
      - echo Build completed on `date`

artifacts:
  files:
    - '**/*'