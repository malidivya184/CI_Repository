<!DOCTYPE html>
<html>
<head>
    <title>Tic Tac Toe</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
        }
        h2 {
            margin-top: 20px;
        }
        button {
            width: 80px;
            height: 80px;
            font-size: 24px;
            margin: 5px;
        }
    </style>
</head>
<body>

    <h2>Tic Tac Toe</h2>

    {% if winner %}
        <h3>🎉 Winner: {{ winner }}</h3>
        <a href="/reset">Restart Game</a>
    {% endif %}

    <form method="POST">
        {% for i in range(9) %}
            <button type="submit" name="cell" value="{{ i }}">
                {{ board[i] }}
            </button>
            {% if i % 3 == 2 %}
                <br>
            {% endif %}
        {% endfor %}
    </form>

</body>
</html>
